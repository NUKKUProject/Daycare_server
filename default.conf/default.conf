server {
    index index.php index.html;
    server_name localhost;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html; # Root ของระบบ Daycare เดิม

    # HTTP Configuration
    listen 80;

    # SSL Configuration (คงเดิมไว้)
    listen 443 ssl;
    ssl_certificate "/var/www/html/ssl/laragon.crt";
    ssl_certificate_key "/var/www/html/ssl/laragon.key";
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- ส่วนที่ 1: ระบบเดิม (Daycare) ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
   location ^~ /checkin-system {
        alias /var/www/laravel/public; 
        index index.php;
        try_files $uri $uri/ @checkin_system;

        location ~ \.php$ {
            fastcgi_pass app-checkin:9000;
            include fastcgi_params;
            
            # ชี้ไปที่ไฟล์ index.php จริงๆ ในคอนเทนเนอร์
            fastcgi_param SCRIPT_FILENAME /var/www/laravel/public/index.php;
            
            # ส่งค่าเดิมจาก Browser มาทั้งหมด (ห้ามแก้)
            fastcgi_param REQUEST_URI $request_uri;
            
            # บอก Laravel ว่านี่คือ HTTPS นะ (ป้องกัน Redirect วนไป http)
            fastcgi_param HTTPS on;
            fastcgi_param SERVER_PORT 443;
        }
    }

    location @checkin_system {
        #Rewrite เข้าสู่ index.php โดยใช้ URI เต็ม
        rewrite ^/checkin-system/(.*)$ /checkin-system/index.php?/$1 last;
        rewrite ^/checkin-system$ /checkin-system/index.php?/ last;
    }

    # --- ส่วนที่ 3: จัดการ PHP ของระบบเดิม (Daycare) ---
    location ~ \.php$ {
        # ป้องกันไม่ให้ซ้อนทับกับ checkin-system
        if ($request_uri ~* "/checkin-system") {
            return 404;
        }
        
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php8:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location @extensionless-php {
        rewrite ^(.*)$ $1.php last;
    }
}